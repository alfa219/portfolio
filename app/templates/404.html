{% extends 'base.html' %}

{% block title %}404 — {{ config.OWNER_NAME }}{% endblock %}

{% block content %}
<section class="err-section">
  <div class="container">
    <div class="kicker">{{ t.err404_kicker }}</div>
    <h1 class="err-code">404</h1>
    <p class="err-p">{{ t.err404_p }}</p>
    <a href="/" class="btn btn-primary btn-icon">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M11 19l-7-7 7-7"/></svg>
      <span>{{ t.err404_btn }}</span>
    </a>
  </div>
</section>
{% endblock %}
