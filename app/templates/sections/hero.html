<section class="hero" id="home">
  <div class="hero-bg">
    <svg viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid-fine" width="48" height="48" patternUnits="userSpaceOnUse">
          <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.018)" stroke-width="1"/>
        </pattern>
        <pattern id="grid-major" width="240" height="240" patternUnits="userSpaceOnUse">
          <path d="M 240 0 L 0 0 0 240" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
        </pattern>
        <linearGradient id="fade-bottom" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0"/>
          <stop offset="100%" stop-color="#0A0A0A" stop-opacity="1"/>
        </linearGradient>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid-fine)"/>
      <rect width="100%" height="100%" fill="url(#grid-major)"/>
      <line x1="0" y1="360" x2="1280" y2="360" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <line x1="640" y1="0" x2="640" y2="720" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      {% for x, y, dur in [(240,240,3.0),(480,240,3.4),(800,480,3.8),(1040,240,4.2),(480,480,4.6)] %}
      <g>
        <circle cx="{{ x }}" cy="{{ y }}" r="2" fill="#FFFFFF" opacity="0.4">
          <animate attributeName="opacity" values="0.2;0.5;0.2" dur="{{ dur }}s" repeatCount="indefinite"/>
        </circle>
      </g>
      {% endfor %}
      <rect width="100%" height="100%" fill="url(#fade-bottom)"/>
    </svg>
  </div>
  <div class="hero-gradient"></div>
  <div class="hero-vignette"></div>

  <div class="circuit-wrap" aria-hidden="true">
    <svg viewBox="0 0 400 400">
      <defs>
        <radialGradient id="chip-glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.09)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
      </defs>

      <circle cx="200" cy="200" r="190" fill="url(#chip-glow)"/>

      {# Copper traces #}
      <g fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="1.6" stroke-linejoin="round">
        {% for d in [
          'M 170 132 L 170 92 L 110 92 L 110 44',
          'M 200 132 L 200 56',
          'M 230 132 L 230 96 L 302 96 L 302 48',
          'M 268 170 L 330 170 L 330 118',
          'M 268 200 L 362 200',
          'M 268 230 L 322 230 L 322 304',
          'M 230 268 L 230 332 L 292 332',
          'M 200 268 L 200 356',
          'M 170 268 L 170 314 L 102 314',
          'M 132 230 L 72 230 L 72 292',
          'M 132 200 L 40 200',
          'M 132 170 L 92 170 L 92 112',
        ] %}
        <path d="{{ d }}"/>
        {% endfor %}
      </g>

      {# Pads at trace ends #}
      <g fill="#0A0A0A" stroke="rgba(255,255,255,0.4)" stroke-width="1.5">
        {% for x, y in [(110,44),(200,56),(302,48),(330,118),(362,200),(322,304),(292,332),(200,356),(102,314),(72,292),(40,200),(92,112)] %}
        <circle cx="{{ x }}" cy="{{ y }}" r="4"/>
        {% endfor %}
      </g>

      {# Signal pulses travelling along the traces #}
      {% for path, dur, begin in [
        ('M 170 132 L 170 92 L 110 92 L 110 44', '3.2s', '0s'),
        ('M 230 132 L 230 96 L 302 96 L 302 48', '2.8s', '0.9s'),
        ('M 268 200 L 362 200', '2.4s', '1.6s'),
        ('M 200 268 L 200 356', '3.6s', '0.4s'),
        ('M 40 200 L 132 200', '3.0s', '2.1s'),
        ('M 102 314 L 170 314 L 170 268', '3.4s', '1.2s'),
        ('M 330 118 L 330 170 L 268 170', '3.8s', '2.6s'),
      ] %}
      <g opacity="0">
        <circle r="7" fill="#FFFFFF" opacity="0.15"/>
        <circle r="2.6" fill="#FFFFFF"/>
        <animateMotion dur="{{ dur }}" begin="{{ begin }}" repeatCount="indefinite" path="{{ path }}"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="{{ dur }}" begin="{{ begin }}" repeatCount="indefinite"/>
      </g>
      {% endfor %}

      {# MCU chip #}
      <g>
        {% for i in range(8) %}
        <g fill="#9CA3AF">
          <rect x="{{ 150 + i * 13 }}" y="131" width="6" height="9" rx="1"/>
          <rect x="{{ 150 + i * 13 }}" y="260" width="6" height="9" rx="1"/>
          <rect x="131" y="{{ 150 + i * 13 }}" width="9" height="6" rx="1"/>
          <rect x="260" y="{{ 150 + i * 13 }}" width="9" height="6" rx="1"/>
        </g>
        {% endfor %}
        <rect x="140" y="140" width="120" height="120" rx="10" fill="#0F1418" stroke="#F5F5F5" stroke-width="1.8"/>
        <rect x="152" y="152" width="96" height="96" rx="6" fill="#0a0d10" stroke="rgba(255,255,255,0.15)"/>
        <text x="200" y="198" text-anchor="middle" font-family="JetBrains Mono" font-size="14" fill="#E5E5E5" letter-spacing="3">ESP32</text>
        <text x="200" y="216" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#666" letter-spacing="1.5">WROOM-32</text>
        <circle cx="161" cy="161" r="2.5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
        <circle cx="239" cy="239" r="2.5" fill="#FFFFFF">
          <animate attributeName="opacity" values="0.25;1;0.25" dur="1.6s" repeatCount="indefinite"/>
        </circle>
      </g>
    </svg>
  </div>

  <div class="container hero-content">
    <h1 class="stagger-name" data-stagger="{{ config.OWNER_NAME }}"></h1>

    <div class="role-rotator">
      <span class="role-rotator-prefix">{{ t.hero_currently }}</span>
      <div class="role-rotator-mask">
        <div class="role-rotator-track" id="role-rotator-track">
          <div class="role-rotator-item">{{ t.hero_role_1 }}</div>
          <div class="role-rotator-item">{{ t.hero_role_2 }}</div>
          <div class="role-rotator-item">{{ t.hero_role_3 }}</div>
          <div class="role-rotator-item">{{ t.hero_role_4 }}</div>
          <div class="role-rotator-item">{{ t.hero_role_1 }}</div>
        </div>
      </div>
    </div>

    <p class="tagline">{{ t.hero_tagline }}</p>
    <div class="hero-cta">
      <a href="#projects" class="btn btn-primary btn-icon">
        <span>{{ t.hero_btn_projects }}</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>
      <a href="{{ url_for('static', filename='wildan-alfa-raezel-cv.pdf') }}" class="btn btn-ghost btn-icon" download>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        <span>{{ t.hero_btn_cv }}</span>
      </a>
    </div>
    <div class="hero-socials">
      <a href="https://github.com/alfa219" aria-label="GitHub" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.1.39-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.64.71 1.03 1.61 1.03 2.71 0 3.84-2.34 4.68-4.57 4.93.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12c0-5.52-4.48-10-10-10z"/>
        </svg>
      </a>
      <a href="https://www.linkedin.com/in/wildan-alfa-raezel-a60629387" aria-label="LinkedIn" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-4 0v7h-4v-7a6 6 0 016-6zM2 9h4v12H2zM4 6a2 2 0 110-4 2 2 0 010 4z"/>
        </svg>
      </a>
      <a href="mailto:{{ config.OWNER_EMAIL }}" aria-label="Email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zM22 6l-10 7L2 6"/>
        </svg>
      </a>
    </div>
  </div>

</section>
