<section id="blog">
  <div class="container">
    <div class="section-head-row">
      <div>
        <div class="kicker">{{ t.blog_kicker }}</div>
        <h2 class="section-title">{{ t.blog_title_l1 }}<br/>{{ t.blog_title_l2 }}</h2>
        <p class="section-sub">{{ t.blog_sub }}</p>
      </div>
      <div class="section-meta">
        <div>{{ t.blog_meta_posts }} <span class="v">23</span></div>
        <div>{{ t.blog_meta_subs }} <span class="v">2,140</span></div>
      </div>
    </div>

    <div class="blog-grid">
      {% for p in posts %}
      <article class="blog-card reveal">
        <div class="blog-thumb">
          <svg viewBox="0 0 600 320" preserveAspectRatio="xMidYMid slice">
            <defs>
              <pattern id="bg-{{ loop.index }}" width="24" height="24" patternUnits="userSpaceOnUse">
                <path d="M 24 0 L 0 0 0 24" fill="none" stroke="{{ p.accent }}22"/>
              </pattern>
            </defs>
            <rect width="600" height="320" fill="#0B1014"/>
            <rect width="600" height="320" fill="url(#bg-{{ loop.index }})"/>
            <text x="300" y="170" text-anchor="middle" font-family="Space Grotesk" font-size="72" fill="{{ p.accent }}" opacity="0.5" font-weight="600">{{ p.glyph }}</text>
            <text x="300" y="240" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="#9CA3AF">[{{ p.label }}]</text>
          </svg>
        </div>
        <div class="blog-body">
          <div class="blog-meta">
            <span class="tag">{{ p.tag }}</span>
            <span>·</span>
            <span>{{ p.date }}</span>
            <span>·</span>
            <span>{{ p.read }}</span>
          </div>
          <h3 class="blog-title">{{ p.title }}</h3>
          <p class="blog-excerpt">{{ p.excerpt }}</p>
          <a href="#" class="blog-readmore">
            {{ t.blog_read }}
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          </a>
        </div>
      </article>
      {% endfor %}
    </div>
  </div>
</section>
