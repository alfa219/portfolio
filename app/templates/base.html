<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}{{ config.OWNER_NAME }} · IoT Engineer Portfolio{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ t.meta_description }}{% endblock %}"/>
  <meta name="author" content="{{ config.OWNER_NAME }}"/>
  <meta name="robots" content="index, follow"/>
  <meta name="theme-color" content="#0A0A0A"/>

  <meta property="og:title" content="{{ config.OWNER_NAME }} — IoT Engineer Portfolio"/>
  <meta property="og:description" content="{{ t.meta_description }}"/>
  <meta property="og:type" content="website"/>
  <meta property="og:image" content="{{ url_for('static', filename='og-image.png', _external=True) }}"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="{{ config.OWNER_NAME }} — IoT Engineer Portfolio"/>
  <meta name="twitter:description" content="{{ t.meta_description }}"/>
  <meta name="twitter:image" content="{{ url_for('static', filename='og-image.png', _external=True) }}"/>

  <script type="application/ld+json">{{ {
    '@context': 'https://schema.org',
    '@type': 'Person',
    'name': config.OWNER_NAME,
    'jobTitle': 'Computer Engineering Student — IoT & Embedded Systems',
    'email': 'mailto:' ~ config.OWNER_EMAIL,
    'url': request.url_root,
    'sameAs': ['https://github.com/alfa219'],
    'affiliation': {'@type': 'CollegeOrUniversity', 'name': 'Universitas Amikom Yogyakarta'}
  } | tojson }}</script>

  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
</head>
<body>
  <a href="#main" class="skip-link">{{ t.skip_to_content }}</a>

  {% block nav %}{% include 'components/nav.html' %}{% endblock %}

  <main id="main">
    {% block content %}{% endblock %}
  </main>

  {% include 'components/footer.html' %}
  {% include 'components/back_to_top.html' %}

  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</body>
</html>
